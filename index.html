<!DOCTYPE html>
<html>
<head>
    <title>Personality Assessment</title>
</head>
<body>
    <h1>Personality Assessment</h1>
    <form id="assessment-form">
        <div id="questions-container"></div>
        <button type="submit">Submit</button>
    </form>
    <div id="results" style="display:none;"></div>

    <script>
        const questions = [
            { type: 'Der Starke', question: 'Question 1 for Der Starke' },
            { type: 'Der Starke', question: 'Question 2 for Der Starke' },
            { type: 'Der Hilfsbereite', question: 'Question 1 for Der Hilfsbereite' },
            { type: 'Der Hilfsbereite', question: 'Question 2 for Der Hilfsbereite' },
            { type: 'Der Perfekte', question: 'Question 1 for Der Perfekte' },
            { type: 'Der Perfekte', question: 'Question 2 for Der Perfekte' },
            { type: 'Der Strukturierte', question: 'Question 1 for Der Strukturierte' },
            { type: 'Der Strukturierte', question: 'Question 2 for Der Strukturierte' },
            // Add all 60 questions in a random order
        ];

        questions.sort(() => Math.random() - 0.5);

        const container = document.getElementById('questions-container');
        const scores = { 'Der Starke': 0, 'Der Hilfsbereite': 0, 'Der Perfekte': 0, 'Der Strukturierte': 0 };

        questions.forEach((q, index) => {
            const questionHTML = `<div>
                <label>${q.question}</label>
                <select name="question-${index}" >
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                </select>
            </div>`;
            container.innerHTML += questionHTML;
        });

        document.getElementById('assessment-form').onsubmit = function(event) {
            event.preventDefault();
            questions.forEach((q, index) => {
                const value = document.querySelector(`select[name='question-${index}']`).value;
                scores[q.type] += parseInt(value);
            });
            displayResults();
        };

        function displayResults() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<h2>Results</h2>';
            for (const [type, score] of Object.entries(scores)) {
                resultsDiv.innerHTML += `<p>${type}: ${score}</p>`;
            }
            resultsDiv.style.display = 'block';
        }
    <\/script>
</body>
</html>
