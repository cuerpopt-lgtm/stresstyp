<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality Assessment</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .question { margin-bottom: 15px; }
        .results { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Interactive Personality Assessment</h1>
    <form id="assessmentForm">
        <div id="questionsContainer"></div>
        <button type="submit">Submit</button>
    </form>
    <div class="results" id="resultsContainer"></div>

    <script>
        // Questions classified by personality types
        const questions = [
            // Add 60 questions here in the following format:
            { text: 'Question 1?', type: 'Der Starke' },
            { text: 'Question 2?', type: 'Der Hilfsbereite' },
            // ... repeat for all questions ...
        ];

        // Function to randomize questions
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Populate questions randomly
        function loadQuestions() {
            const container = document.getElementById('questionsContainer');
            const shuffledQuestions = shuffle([...questions]);
            shuffledQuestions.forEach((question, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question';
                questionDiv.innerHTML = `<label>${question.text}</label>`;
                for (let i = 0; i <= 7; i++) {
                    questionDiv.innerHTML += `<input type='radio' name='question${index}' value='${i}' required>${i}`;
                }
                container.appendChild(questionDiv);
            });
        }

        // Handle form submission
        document.getElementById('assessmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const results = { 'Der Starke': 0, 'Der Hilfsbereite': 0, 'Der Perfekte': 0, 'Der Strukturierte': 0 };
            const formData = new FormData(this);
            for (let [key, value] of formData.entries()) {
                const questionIndex = key.replace('question', '');
                const questionType = questions[questionIndex].type;
                results[questionType] += parseInt(value);
            }
            displayResults(results);
        });

        // Display results
        function displayResults(results) {
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = `<h2>Results</h2>`;
            for (const [type, score] of Object.entries(results)) {
                resultsContainer.innerHTML += `<p>${type}: ${score}</p>`;
            }
            resultsContainer.style.display = 'block';
        }

        loadQuestions();
    </script>
</body>
</html>
